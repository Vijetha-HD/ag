name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            set -e

            echo "📂 Go to project"
            cd ~/ag

            echo "🔁 Ensure GitHub SSH remote"
            git remote set-url origin https://github.com/Vijetha-HD/ag.git

            echo "⬇️ Pulling latest code"
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "🧾 Writing .env"
            echo "${{ secrets.ENV_FILE }}" > .env

            echo "📦 Installing dependencies"
            npm install --production

            echo "🚀 Restarting PM2"
            pm2 restart ag-backend --update-env || pm2 start server.js --name ag-backend
            pm2 save

            echo "✅ Deployment completed successfully!"
